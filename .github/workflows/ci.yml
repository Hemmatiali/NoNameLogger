name: CI

# Builds every target framework and runs the tests on pushes and PRs,
# so breakage is caught before a release tag is pushed.
on:
  push:
    branches: [main, nuget-ready]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/NoNameLogger/NoNameLogger.csproj

      # Build the library for all target frameworks (net8.0;net9.0;net10.0).
      # The test project only targets net9.0, so building the library directly
      # is what catches net8.0/net10.0-specific compile errors.
      - name: Build (all target frameworks)
        run: dotnet build src/NoNameLogger/NoNameLogger.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/NoNameLogger.Tests/NoNameLogger.Tests.csproj -c Release
